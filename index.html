<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>OSCO</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff416c,#ff4b2b,#ffcc00);
height:100vh;
display:flex;
}

/* sidebar */

.sidebar{
width:220px;
background:#111;
color:white;
height:100vh;
padding:20px;
display:none;
flex-direction:column;
justify-content:space-between;
}

.menu p{
margin:15px 0;
cursor:pointer;
}

.menu p:hover{
color:#ff416c;
}

.user{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#2ecc71;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* main */

.main{
flex:1;
display:flex;
flex-direction:column;
}

header{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

.logo{
font-size:36px;
font-weight:bold;
color:white;
cursor:pointer;
}

.auth a{
color:white;
margin-left:20px;
text-decoration:none;
font-size:18px;
cursor:pointer;
}

/* center */

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
margin-top:120px;
}

h1{
color:white;
font-size:52px;
margin-bottom:40px;
}

.form-box{
background:white;
padding:40px;
border-radius:20px;
width:340px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ff416c;
color:white;
cursor:pointer;
}

/* message */

.message{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px 40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;
font-size:18px;
}

</style>

</head>

<body>

<div class="sidebar" id="menu">

<div class="menu">
<p>Цены</p>
<p>Адрес</p>
<p>Примеры</p>
<p>Комментарии</p>
</div>

<div id="userProfile"></div>

</div>

<div class="main">

<header>

<div class="logo" onclick="toggleMenu()">OSCO</div>

<div class="auth">
<a onclick="openSign()">Sign In</a>
<a href="login.html">Login</a>
</div>

</header>

<div class="container">

<h1>Добро пожаловать</h1>

<div class="form-box">

<form onsubmit="sendForm(); return false;">

<input type="text" placeholder="Введите ваше имя">
<input type="tel" placeholder="Введите номер">

<button type="submit">Отправить</button>

</form>

</div>

</div>

</div>

<div class="message" id="msg">
Спасибо! Ваше сообщение отправлено ✅
</div>

<script>

function toggleMenu(){

let menu=document.getElementById("menu")

menu.style.display = menu.style.display==="flex" ? "none" : "flex"

}

/* закрытие при клике */

document.addEventListener("click", function(event){

let sidebar = document.getElementById("menu")
let logo = document.querySelector(".logo")

if(!sidebar.contains(event.target) && !logo.contains(event.target)){
sidebar.style.display="none"
}

})

/* отправка */

function sendForm(){

let msg=document.getElementById("msg")

msg.style.display="block"

setTimeout(function(){
msg.style.display="none"
},3000)

}

/* open sign in */

function openSign(){
window.location.href="sign_in.html"
}

/* user profile */

let user=localStorage.getItem("user")

if(user){

let data=JSON.parse(user)

let initials=(data.name[0]+data.surname[0]).toUpperCase()

document.getElementById("userProfile").innerHTML=`

<div class="user">
<div class="avatar">${initials}</div>
<div>${data.name} ${data.surname}</div>
</div>

`

}

</script>

</body>
</html>
