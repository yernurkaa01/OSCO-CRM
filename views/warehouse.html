<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8" />

    <title>Склад</title>

    <link rel="stylesheet" href="/style.css" />

</head>

<body>

    <div class="nav">

        <a class="nav-link" href="/admin">
            📦 Заказы
        </a>

        <a class="nav-link" href="/admin/clients">
            👥 Клиенты
        </a>

        <a class="nav-link active" href="/admin/history">
            📜 История действий
        </a>
         <a class="nav-link active" href="/admin/history">
            📜 Склад
        </a>

    </div>


    <div class="left" style="width:95%;margin:auto;">

        <h1>📜 Склад</h1>

        <table>

            <thead>

                <tr>
                    <th>Товар</th>
                    <th>Цемент</th>
                    <th>Сухие смесы</th>
                    <th>Иммулция</th>
                </tr>

            </thead>

            <tbody id="historyTable"></tbody>

        </table>

    </div>


    <script>

        async function loadHistory() {

            const res = await fetch("/logs")

            const logs = await res.json()

            const table = document.getElementById("historyTable")

            table.innerHTML = ""

            logs.forEach(log => {

                const tr = document.createElement("tr")

                tr.innerHTML = `
                    <td>${log.user}</td>
                    <td>${log.action}</td>
                    <td>${log.orderId}</td>
                    <td>
                        ${new Date(log.createdAt).toLocaleString()}
                    </td>
                `

                table.appendChild(tr)

            })

        }

        loadHistory()

    </script>

</body>
</html>
